<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" id="metaDesc" content="台勞在德國打工記" />
  <title id="pageTitle">文章 | 台勞在德國打工記</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇩🇪</text></svg>" />
</head>
<body>

<!-- Reading Progress Bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- ========== NAVBAR ========== -->
<nav class="navbar scrolled" id="navbar">
  <div class="container">
    <div class="navbar__inner">
      <a href="index.html" class="navbar__logo">
        <span class="navbar__logo-icon">🇩🇪</span>
        <span>台勞在德國</span>
      </a>
      <button class="navbar__hamburger" id="hamburger" aria-label="選單">
        <span></span><span></span><span></span>
      </button>
      <ul class="navbar__nav" id="navMenu">
        <li><a href="index.html" class="navbar__link">首頁</a></li>
        <li><a href="category.html?cat=來德生活必辦事項" class="navbar__link">來德必辦</a></li>
        <li><a href="category.html?cat=德國生活" class="navbar__link">德國生活</a></li>
        <li><a href="category.html?cat=旅行" class="navbar__link">旅行</a></li>
        <li><a href="category.html?cat=德文" class="navbar__link">德文</a></li>
      </ul>
    </div>
  </div>
</nav>

<!-- ========== POST LAYOUT ========== -->
<main class="post-layout" id="postLayout">

  <!-- Breadcrumb -->
  <nav class="breadcrumb" id="breadcrumb">
    <a href="index.html">首頁</a>
    <span class="breadcrumb__sep">›</span>
    <a href="category.html" id="breadcrumbCat">文章</a>
    <span class="breadcrumb__sep">›</span>
    <span id="breadcrumbTitle">…</span>
  </nav>

  <!-- Post Header -->
  <header class="post-header" id="postHeader">
    <div class="post-header__cats" id="postCats"></div>
    <h1 class="post-header__title" id="postTitle">載入中…</h1>
    <div class="post-header__meta">
      <div class="post-header__meta-item">
        <span>📅</span>
        <span id="postDate"></span>
      </div>
      <div class="post-header__meta-item">
        <span>✍️</span>
        <span>K</span>
      </div>
      <div class="post-header__meta-item" id="readingTimeWrap">
        <span>⏱️</span>
        <span id="readingTime"></span>
      </div>
    </div>
  </header>

  <!-- Post Content -->
  <article class="post-content" id="postContent">
    <!-- JS rendered -->
  </article>

  <!-- Post Tags -->
  <div class="post-tags" id="postTags" style="display:none;">
    <span class="post-tags__label">標籤：</span>
  </div>

  <!-- Related Posts -->
  <div class="related" id="related" style="display:none;">
    <h2 class="related__title">相關文章</h2>
    <div class="related__grid" id="relatedGrid"></div>
  </div>

  <!-- 404 State (hidden by default) -->
  <div id="notFound" style="display:none;">
    <div class="empty-state" style="padding-top:var(--space-16);">
      <div class="empty-state__emoji">😕</div>
      <div class="empty-state__title">找不到這篇文章</div>
      <p>文章可能已移除或網址有誤。</p>
      <br />
      <a href="index.html" class="view-all" style="display:inline-flex;">← 回到首頁</a>
    </div>
  </div>

</main>

<!-- ========== FOOTER ========== -->
<footer class="footer">
  <div class="container">
    <div class="footer__inner">
      <div class="footer__brand">
        <div class="footer__brand-name">🇩🇪 台勞在德國打工記</div>
        <p class="footer__brand-desc">台灣人在德國的生活記錄，分享實用資訊、旅行攻略與德語學習。</p>
      </div>
      <div>
        <div class="footer__col-title">分類</div>
        <ul class="footer__links">
          <li><a href="category.html?cat=來德生活必辦事項" class="footer__link">來德生活必辦事項</a></li>
          <li><a href="category.html?cat=德國生活" class="footer__link">德國生活</a></li>
          <li><a href="category.html?cat=旅行" class="footer__link">旅行</a></li>
          <li><a href="category.html?cat=德文" class="footer__link">德文</a></li>
        </ul>
      </div>
      <div>
        <div class="footer__col-title">最新文章</div>
        <ul class="footer__links" id="footerLinks"></ul>
      </div>
    </div>
    <div class="footer__bottom">
      <span>© 2026 台勞在德國打工記 · Taiwanese in Germany</span>
    </div>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/post.js"></script>
</body>
</html>
